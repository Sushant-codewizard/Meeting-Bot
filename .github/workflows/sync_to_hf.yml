name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push Backend to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Clone temporary Hugging Face repo
          git clone https://x-access-token:$HF_TOKEN@huggingface.co/spaces/Sushant8455/Ogm-meeter hf_space
          
          # Copy only the backend content into the Hugging Face repo root
          cp -r meeting-bot/backend/* hf_space/
          
          # Move to hf_space, commit and push
          cd hf_space
          git add .
          git commit -m "Deploy backend from GitHub Actions" || exit 0
          git push origin main --force
